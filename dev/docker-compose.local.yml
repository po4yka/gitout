version: "3.9"

services:
  gitout:
    build:
      context: ..
    image: gitout-dev:local
    restart: "no"
    volumes:
      - ./config.local.toml:/config/config.toml:ro
      - ./data:/data
    environment:
      - GITHUB_TOKEN_FILE=/run/secrets/github_pat
      - TELEGRAM_BOT_TOKEN_FILE=/run/secrets/telegram_bot_token
      - GEMINI_API_KEY_FILE=/run/secrets/gemini_api_key
      - GITOUT_CRON=
      - GITOUT_DRY_RUN=true
      - GITOUT_WORKERS=2
    secrets:
      - github_pat
      - telegram_bot_token
      - gemini_api_key
    command:
      - -vv
      - /config/config.toml
      - /data
    depends_on:
      qdrant:
        condition: service_healthy

  qdrant:
    image: qdrant/qdrant:latest
    container_name: gitout-qdrant-dev
    restart: unless-stopped
    volumes:
      - ./data/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

secrets:
  github_pat:
    file: ./secrets/github_token.txt
  telegram_bot_token:
    file: ./secrets/telegram_bot_token.txt
  gemini_api_key:
    file: ./secrets/gemini_api_key.txt

