name: Build & Test

on:
  pull_request: {}
  push:
    branches:
      - master
  workflow_dispatch: {}

jobs:
  test:
    name: Lint, type-check & tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Ruff
        run: ruff check gitout tests

      - name: Mypy
        run: mypy gitout

      - name: Pytest
        run: python -m pytest -q

  docker:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          push: false
          tags: gitout:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image (--help)
        run: docker run --rm gitout:test --help

      - name: Test Docker image (--version)
        run: docker run --rm gitout:test --version
