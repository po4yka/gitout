name: Publish

on:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-distributions:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]" build

      - name: Test
        run: python -m pytest -q

      - name: Build distributions
        run: python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: gitout-dist
          path: dist/*
          if-no-files-found: error

  publish-docker:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs: build-distributions
    permissions:
      contents: read
      packages: write
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker meta (Docker Hub)
        id: meta_dockerhub
        uses: docker/metadata-action@v6
        with:
          images: po4yka/gitout
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Docker meta (GHCR)
        id: meta_ghcr
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/po4yka/gitout
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to Docker Hub
        if: ${{ env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != '' }}
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta_ghcr.outputs.tags }}
            ${{ env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != '' && steps.meta_dockerhub.outputs.tags || '' }}
          labels: |
            ${{ steps.meta_dockerhub.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - build-distributions
      - publish-docker
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: gitout-dist
          path: dist/

      - name: Extract release notes
        id: release_notes
        uses: ffurrer2/extract-release-notes@v3
        with:
          changelog_file: CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body: |
            ${{ steps.release_notes.outputs.release_notes }}

            ## Docker Images

            ```bash
            # Docker Hub
            docker pull po4yka/gitout:${{ github.ref_name }}
            docker pull po4yka/gitout:latest

            # GitHub Container Registry
            docker pull ghcr.io/po4yka/gitout:${{ github.ref_name }}
            docker pull ghcr.io/po4yka/gitout:latest
            ```

            ## Installation

            ```bash
            pip install gitout-*.whl
            gitout sync config.toml /backup/path
            ```

            Requires Python 3.11 or later.
          files: |
            dist/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
