name: Python Port

on:
  pull_request:
    paths:
      - "python/**"
      - ".github/workflows/python.yaml"
  push:
    branches:
      - master
    paths:
      - "python/**"
      - ".github/workflows/python.yaml"
  workflow_dispatch: {}

defaults:
  run:
    working-directory: python

jobs:
  test:
    name: Lint, type-check & characterization suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy gitout

      - name: Pytest (xfail-aware; characterization suite is red until Phase 1)
        run: python -m pytest -q
